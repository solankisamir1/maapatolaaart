    <script>
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('patolaCart')) || [];

        updateCartCount(); 
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Website mein jitne bhi Saree aur Category ke card hain, unko dhoondho
            const cards = document.querySelectorAll('.product-card, .showcase-card');

            // Sabme chhupne wali class daal do
            cards.forEach(card => card.classList.add('scroll-animate'));

            // Jaise hi customer scroll karke card ke paas pahuche, usko dikha do
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target); // Ek baar aane ke baad wapas na chhhipe
                    }
                });
            }, { threshold: 0.1 }); // 10% card dikhte hi animation shuru hoga

            cards.forEach(card => observer.observe(card));
        });
    </script>

    <script>
        // 1. Page load hote hi apne aap Cart ka number theek karega
        window.onload = function() {
            let cart = JSON.parse(localStorage.getItem('patolaCart')) || [];
            let cartCountElement = document.getElementById('cart-count');
            if (cartCountElement) {
                cartCountElement.innerText = cart.length; // Memory se length nikal kar HTML me dalega
            }
        };

        // 2. Add to Cart ka function
        function addToCart(itemName, itemPrice, itemImage) {
            let cart = JSON.parse(localStorage.getItem('patolaCart')) || [];
            
            let newItem = {
                name: itemName,
                price: itemPrice,
                image: itemImage
            };
            
            cart.push(newItem);
            localStorage.setItem('patolaCart', JSON.stringify(cart));
            
            // Turant number update karo
            let cartCountElement = document.getElementById('cart-count');
            if (cartCountElement) {
                cartCountElement.innerText = cart.length;
            }
            
            alert(itemName + " Selected! 🛒");
        }
    </script>
